<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Редактор карты - рисуйте маршруты</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #1a1a1a;
            height: 100vh;
            overflow: hidden;
        }

        .editor-container {
            display: flex;
            height: 100vh;
        }

        .toolbar {
            width: 320px;
            background: #2d2d2d;
            border-right: 1px solid #404040;
            padding: 20px;
            overflow-y: auto;
            color: #fff;
        }

        .toolbar h2 {
            font-size: 18px;
            margin-bottom: 20px;
        }

        .tool-section {
            margin-bottom: 25px;
            background: #363636;
            border-radius: 8px;
            padding: 15px;
        }

        .tool-section h3 {
            font-size: 13px;
            color: #aaa;
            margin-bottom: 12px;
        }

        .route-type-buttons {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        .route-type-btn {
            flex: 1;
            padding: 12px;
            border: 2px solid #404040;
            border-radius: 8px;
            background: #2d2d2d;
            color: #fff;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s;
        }

        .route-type-btn.normal.active {
            background: #0078d4;
            border-color: #0078d4;
        }

        .route-type-btn.evacuation.active {
            background: #dc2626;
            border-color: #dc2626;
        }

        .tools-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
        }

        .tool-btn {
            padding: 10px;
            border: 1px solid #404040;
            border-radius: 6px;
            background: #2d2d2d;
            color: #fff;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }

        .tool-btn.active {
            background: #0078d4;
        }

        .floor-buttons {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
        }

        .floor-btn {
            padding: 10px;
            border: 1px solid #404040;
            border-radius: 6px;
            background: #2d2d2d;
            color: #fff;
            cursor: pointer;
        }

        .floor-btn.active {
            background: #0078d4;
        }

        .routes-list, .evacuation-list {
            max-height: 200px;
            overflow-y: auto;
            border: 1px solid #404040;
            border-radius: 4px;
            margin-top: 10px;
        }

        .route-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 10px;
            border-bottom: 1px solid #404040;
            font-size: 12px;
            cursor: pointer;
        }

        .route-item:hover {
            background: #363636;
        }

        .route-item.selected {
            background: #1e3a5f;
            border-left: 3px solid #0078d4;
        }

        .route-item.evacuation.selected {
            border-left-color: #dc2626;
        }

        .route-name.normal { color: #0078d4; }
        .route-name.evacuation { color: #dc2626; }

        .action-icon {
            padding: 4px 8px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
        }

        .action-icon.delete { color: #dc2626; }
        .action-icon.delete:hover { background: #dc2626; color: white; }

        .action-btn {
            width: 100%;
            padding: 10px;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            margin-bottom: 8px;
        }

        .action-btn.save { background: #4caf50; color: white; }
        .action-btn.clear { background: #dc2626; color: white; }

        .map-area {
            flex: 1;
            position: relative;
            background: #1e1e1e;
        }

        #mapCanvas {
            width: 100%;
            height: 100%;
            cursor: crosshair;
        }

        .info-bar {
            position: absolute;
            bottom: 20px;
            left: 340px;
            right: 20px;
            background: rgba(45,45,45,0.95);
            border-radius: 8px;
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            color: #fff;
            backdrop-filter: blur(10px);
        }

        .coord-value { color: #0078d4; font-weight: bold; }
        .route-type-indicator { padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: bold; }
        .route-type-indicator.normal { background: #0078d4; }
        .route-type-indicator.evacuation { background: #dc2626; }
    </style>
</head>
<body>
    <div class="editor-container">
        <div class="toolbar">
            <h2>✏️ Редактор маршрутов</h2>

            <div class="tool-section">
                <h3>🎨 ТИП МАРШРУТА</h3>
                <div class="route-type-buttons">
                    <button class="route-type-btn normal active" id="btnNormal" onclick="setRouteType('normal')">
                        🔵 ОБЫЧНЫЙ (синий)
                    </button>
                    <button class="route-type-btn evacuation" id="btnEvacuation" onclick="setRouteType('evacuation')">
                        🔴 ЭВАКУАЦИОННЫЙ (красный)
                    </button>
                </div>
                <div style="margin-top: 10px; font-size: 12px; color: #aaa; text-align: center;">
                    <span id="currentRouteTypeLabel">🔵 Сейчас рисуем: ОБЫЧНЫЙ</span>
                </div>
            </div>

            <div class="tool-section">
                <h3>🏢 ЭТАЖ</h3>
                <div class="floor-buttons">
                    <button class="floor-btn" data-floor="1" onclick="changeFloor(1)">1</button>
                    <button class="floor-btn" data-floor="2" onclick="changeFloor(2)">2</button>
                    <button class="floor-btn" data-floor="3" onclick="changeFloor(3)">3</button>
                </div>
            </div>

            <div class="tool-section">
                <h3>🔵 ОБЫЧНЫЕ МАРШРУТЫ</h3>
                <div class="routes-list" id="routesList"></div>
            </div>

            <div class="tool-section">
                <h3>🔴 ЭВАКУАЦИОННЫЕ МАРШРУТЫ</h3>
                <div class="evacuation-list" id="evacuationList"></div>
            </div>

            <div class="tool-section">
                <button class="action-btn save" onclick="forceSaveAll()">💾 ПРИНУДИТЕЛЬНО СОХРАНИТЬ</button>
                <button class="action-btn clear" onclick="clearCurrentFloor()">🗑️ ОЧИСТИТЬ ЭТАЖ</button>
            </div>

            <div style="font-size: 11px; color: #4caf50; text-align: center; margin-top: 10px;" id="saveStatus">
                ✅ Готов к работе
            </div>
        </div>

        <div class="map-area">
            <canvas id="mapCanvas"></canvas>
            <div class="info-bar">
                <div>📍 X: <span class="coord-value" id="coordX">0</span> | Y: <span class="coord-value" id="coordY">0</span></div>
                <div>🔧 <span id="toolStatus">Режим: Рисование</span></div>
                <div id="routeTypeBadge" class="route-type-indicator normal">🔵 Обычный</div>
            </div>
        </div>
    </div>

    <script>
        // ========== ДАННЫЕ ==========
        let currentFloor = 1;
        let currentRouteType = 'normal';

        let normalRoutes = {1: [], 2: [], 3: []};
        let evacuationRoutes = {1: [], 2: [], 3: []};
        let walls = {1: [], 2: [], 3: []};

        let isDrawing = false;
        let currentPoints = [];
        let selectedRoute = null;

        let offsetX = 0, offsetY = 0, scale = 1;
        let isPanning = false, lastX = 0, lastY = 0;

        const canvas = document.getElementById('mapCanvas');
        const ctx = canvas.getContext('2d');

        // ========== ИНИЦИАЛИЗАЦИЯ ==========
        function resizeCanvas() {
            canvas.width = window.innerWidth - 320;
            canvas.height = window.innerHeight;
            draw();
        }

        async function loadData() {
            try {
                // Загружаем стены
                const wallsRes = await fetch('/api/load-map');
                const wallsData = await wallsRes.json();
                if (wallsData.floors) {
                    for (let i = 1; i <= 3; i++) {
                        walls[i] = wallsData.floors[i]?.walls || [];
                    }
                }

                // Загружаем обычные маршруты
                const routesRes = await fetch('/api/routes');
                const routesData = await routesRes.json();
                normalRoutes = {1: [], 2: [], 3: []};
                for (const [key, route] of Object.entries(routesData)) {
                    const points = route.points || [];
                    if (points.length > 0) {
                        const floor = points[0].floor || 1;
                        normalRoutes[floor].push({
                            id: key,
                            name: route.name || key,
                            points: points,
                            type: 'normal'
                        });
                    }
                }

                // Загружаем эвакуационные маршруты
                const evacRes = await fetch('/api/evacuation-routes');
                const evacData = await evacRes.json();
                evacuationRoutes = {1: [], 2: [], 3: []};
                for (const [key, route] of Object.entries(evacData)) {
                    const points = route.points || [];
                    if (points.length > 0) {
                        const floor = points[0].floor || 1;
                        evacuationRoutes[floor].push({
                            id: key,
                            name: route.name || key,
                            points: points,
                            type: 'evacuation'
                        });
                    }
                }

                console.log('✅ Загружено:', {
                    normal: normalRoutes[1].length + normalRoutes[2].length + normalRoutes[3].length,
                    evacuation: evacuationRoutes[1].length + evacuationRoutes[2].length + evacuationRoutes[3].length
                });

                updateLists();
                draw();
                fitToScreen();
                showStatus('✅ Данные загружены');
            } catch (error) {
                console.error('Ошибка загрузки:', error);
                showStatus('❌ Ошибка загрузки');
            }
        }

        // ========== ОТРИСОВКА ==========
        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.save();
            ctx.translate(offsetX, offsetY);
            ctx.scale(scale, scale);

            drawGrid();
            drawWalls();
            drawRoutes(normalRoutes[currentFloor], '#0078d4', 3);
            drawRoutes(evacuationRoutes[currentFloor], '#dc2626', 5);

            if (selectedRoute) {
                drawSelectedRoute(selectedRoute);
            }

            if (isDrawing && currentPoints.length > 0) {
                drawPreview();
            }

            ctx.restore();
        }

        function drawGrid() {
            ctx.strokeStyle = '#333';
            ctx.lineWidth = 0.5 / scale;
            const step = 50;
            const startX = -offsetX / scale;
            const startY = -offsetY / scale;
            const endX = startX + canvas.width / scale;
            const endY = startY + canvas.height / scale;

            for (let x = Math.floor(startX / step) * step; x < endX; x += step) {
                ctx.beginPath();
                ctx.moveTo(x, startY);
                ctx.lineTo(x, endY);
                ctx.stroke();
            }
            for (let y = Math.floor(startY / step) * step; y < endY; y += step) {
                ctx.beginPath();
                ctx.moveTo(startX, y);
                ctx.lineTo(endX, y);
                ctx.stroke();
            }
        }

        function drawWalls() {
            ctx.strokeStyle = '#4a90e2';
            ctx.lineWidth = 4 / scale;
            walls[currentFloor].forEach(wall => {
                ctx.beginPath();
                ctx.moveTo(wall.x1, wall.y1);
                ctx.lineTo(wall.x2, wall.y2);
                ctx.stroke();
            });
        }

        function drawRoutes(routes, color, width) {
            routes.forEach(route => {
                const points = route.points;
                if (points.length < 2) return;

                ctx.strokeStyle = color;
                ctx.lineWidth = width / scale;
                ctx.lineCap = 'round';

                ctx.beginPath();
                ctx.moveTo(points[0].x, points[0].y);
                for (let i = 1; i < points.length; i++) {
                    ctx.lineTo(points[i].x, points[i].y);
                }
                ctx.stroke();

                ctx.fillStyle = color;
                points.forEach(point => {
                    ctx.beginPath();
                    ctx.arc(point.x, point.y, 4 / scale, 0, 2 * Math.PI);
                    ctx.fill();
                });
            });
        }

        function drawSelectedRoute(route) {
            const points = route.points;
            if (points.length < 2) return;

            const color = route.type === 'normal' ? '#0078d4' : '#dc2626';

            ctx.strokeStyle = 'white';
            ctx.lineWidth = 8 / scale;
            ctx.beginPath();
            ctx.moveTo(points[0].x, points[0].y);
            for (let i = 1; i < points.length; i++) {
                ctx.lineTo(points[i].x, points[i].y);
            }
            ctx.stroke();

            ctx.strokeStyle = color;
            ctx.lineWidth = 5 / scale;
            ctx.beginPath();
            ctx.moveTo(points[0].x, points[0].y);
            for (let i = 1; i < points.length; i++) {
                ctx.lineTo(points[i].x, points[i].y);
            }
            ctx.stroke();

            points.forEach(point => {
                ctx.fillStyle = color;
                ctx.beginPath();
                ctx.arc(point.x, point.y, 6 / scale, 0, 2 * Math.PI);
                ctx.fill();
                ctx.strokeStyle = 'white';
                ctx.lineWidth = 2 / scale;
                ctx.stroke();
            });
        }

        let lastMousePoint = null;

        function drawPreview() {
            if (currentPoints.length === 0) return;

            const color = currentRouteType === 'normal' ? '#0078d4' : '#dc2626';

            ctx.strokeStyle = color;
            ctx.lineWidth = 4 / scale;
            ctx.setLineDash([8 / scale, 4 / scale]);

            ctx.beginPath();
            ctx.moveTo(currentPoints[0].x, currentPoints[0].y);
            for (let i = 1; i < currentPoints.length; i++) {
                ctx.lineTo(currentPoints[i].x, currentPoints[i].y);
            }
            if (lastMousePoint) {
                ctx.lineTo(lastMousePoint.x, lastMousePoint.y);
            }
            ctx.stroke();

            ctx.fillStyle = color;
            currentPoints.forEach(point => {
                ctx.beginPath();
                ctx.arc(point.x, point.y, 5 / scale, 0, 2 * Math.PI);
                ctx.fill();
            });

            ctx.setLineDash([]);
        }

        // ========== РИСОВАНИЕ ==========
        function startDrawing(x, y) {
            isDrawing = true;
            currentPoints = [{x: Math.round(x), y: Math.round(y), floor: currentFloor}];
            draw();
        }

        function addPointToRoute(x, y) {
            if (!isDrawing) return;
            currentPoints.push({x: Math.round(x), y: Math.round(y), floor: currentFloor});
            draw();
        }

        async function finishDrawing() {
            if (!isDrawing || currentPoints.length < 2) {
                isDrawing = false;
                currentPoints = [];
                draw();
                return;
            }

            const routeTypeText = currentRouteType === 'normal' ? 'обычный' : 'ЭВАКУАЦИОННЫЙ';
            const defaultName = currentRouteType === 'normal' ? 'Новый маршрут' : '🚨 ЭВАКУАЦИЯ К ВЫХОДУ';
            const name = prompt(`Введите название ${routeTypeText} маршрута:`, defaultName);

            if (name) {
                const routeId = `route_${Date.now()}`;
                const newRoute = {
                    id: routeId,
                    name: name,
                    points: [...currentPoints],
                    type: currentRouteType
                };

                if (currentRouteType === 'normal') {
                    normalRoutes[currentFloor].push(newRoute);
                } else {
                    evacuationRoutes[currentFloor].push(newRoute);
                }

                updateLists();
                await forceSaveAll();
                showStatus(`✅ Маршрут "${name}" сохранен`);
            }

            isDrawing = false;
            currentPoints = [];
            lastMousePoint = null;
            draw();
        }

        // ========== УПРАВЛЕНИЕ ==========
        function setRouteType(type) {
            currentRouteType = type;
            document.getElementById('btnNormal').classList.toggle('active', type === 'normal');
            document.getElementById('btnEvacuation').classList.toggle('active', type === 'evacuation');

            const label = document.getElementById('currentRouteTypeLabel');
            const badge = document.getElementById('routeTypeBadge');

            if (type === 'normal') {
                label.innerHTML = '🔵 Сейчас рисуем: ОБЫЧНЫЙ (синий)';
                badge.className = 'route-type-indicator normal';
                badge.innerHTML = '🔵 Обычный';
            } else {
                label.innerHTML = '🔴 Сейчас рисуем: ЭВАКУАЦИОННЫЙ (красный)';
                badge.className = 'route-type-indicator evacuation';
                badge.innerHTML = '🔴 Эвакуация';
            }
        }

        function changeFloor(floor) {
            currentFloor = floor;
            document.querySelectorAll('.floor-btn').forEach(btn => {
                btn.classList.remove('active');
                if (parseInt(btn.dataset.floor) === floor) btn.classList.add('active');
            });
            selectedRoute = null;
            draw();
            fitToScreen();
        }

        // ========== МЫШЬ ==========
        function getCanvasCoords(e) {
            const rect = canvas.getBoundingClientRect();
            const clientX = e.clientX || (e.touches ? e.touches[0].clientX : 0);
            const clientY = e.clientY || (e.touches ? e.touches[0].clientY : 0);
            const x = (clientX - rect.left - offsetX) / scale;
            const y = (clientY - rect.top - offsetY) / scale;
            return { x, y };
        }

        canvas.addEventListener('mousedown', (e) => {
            if (e.ctrlKey || e.button === 1) {
                isPanning = true;
                lastX = e.clientX;
                lastY = e.clientY;
                return;
            }

            const { x, y } = getCanvasCoords(e);

            if (isDrawing) {
                addPointToRoute(x, y);
            } else {
                // Начинаем новый маршрут
                startDrawing(x, y);
            }
        });

        canvas.addEventListener('mousemove', (e) => {
            const { x, y } = getCanvasCoords(e);
            document.getElementById('coordX').textContent = Math.round(x);
            document.getElementById('coordY').textContent = Math.round(y);

            if (isPanning) {
                const dx = e.clientX - lastX;
                const dy = e.clientY - lastY;
                offsetX += dx;
                offsetY += dy;
                lastX = e.clientX;
                lastY = e.clientY;
                draw();
            } else if (isDrawing) {
                lastMousePoint = {x: Math.round(x), y: Math.round(y)};
                draw();
            }
        });

        canvas.addEventListener('mouseup', async (e) => {
            if (isDrawing) {
                await finishDrawing();
            }
            isPanning = false;
        });

        canvas.addEventListener('dblclick', async (e) => {
            e.preventDefault();
            if (isDrawing) {
                await finishDrawing();
            }
        });

        canvas.addEventListener('wheel', (e) => {
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            const mouseX = e.clientX - rect.left;
            const mouseY = e.clientY - rect.top;
            const worldX = (mouseX - offsetX) / scale;
            const worldY = (mouseY - offsetY) / scale;
            const delta = e.deltaY > 0 ? 0.9 : 1.1;
            const newScale = Math.min(Math.max(scale * delta, 0.3), 3);
            offsetX = mouseX - worldX * newScale;
            offsetY = mouseY - worldY * newScale;
            scale = newScale;
            draw();
        });

        // ========== ВЫБОР И УДАЛЕНИЕ ==========
        function selectRoute(x, y) {
            const allRoutes = [...normalRoutes[currentFloor], ...evacuationRoutes[currentFloor]];

            for (const route of allRoutes) {
                for (let i = 0; i < route.points.length - 1; i++) {
                    const p1 = route.points[i];
                    const p2 = route.points[i + 1];
                    const dist = pointToLineDistance(x, y, p1.x, p1.y, p2.x, p2.y);
                    if (dist < 15 / scale) {
                        selectedRoute = route;
                        updateLists();
                        draw();
                        return;
                    }
                }
            }
            selectedRoute = null;
            updateLists();
            draw();
        }

        canvas.addEventListener('contextmenu', (e) => {
            e.preventDefault();
            const { x, y } = getCanvasCoords(e);
            selectRoute(x, y);
            return false;
        });

        function pointToLineDistance(px, py, x1, y1, x2, y2) {
            const A = px - x1;
            const B = py - y1;
            const C = x2 - x1;
            const D = y2 - y1;
            const dot = A * C + B * D;
            const len_sq = C * C + D * D;
            let param = -1;
            if (len_sq !== 0) param = dot / len_sq;
            let xx, yy;
            if (param < 0) { xx = x1; yy = y1; }
            else if (param > 1) { xx = x2; yy = y2; }
            else { xx = x1 + param * C; yy = y1 + param * D; }
            const dx = px - xx;
            const dy = py - yy;
            return Math.sqrt(dx * dx + dy * dy);
        }

        // ========== UI ==========
        function updateLists() {
            const routesDiv = document.getElementById('routesList');
            routesDiv.innerHTML = '';
            normalRoutes[currentFloor].forEach(route => {
                const div = document.createElement('div');
                div.className = `route-item ${selectedRoute === route ? 'selected' : ''}`;
                div.innerHTML = `
                    <div class="route-name normal">🔵 ${route.name}</div>
                    <div class="item-actions">
                        <span class="action-icon delete" onclick="deleteRoute('${route.id}', 'normal')">🗑️</span>
                    </div>
                `;
                routesDiv.appendChild(div);
            });
            if (normalRoutes[currentFloor].length === 0) {
                routesDiv.innerHTML = '<div style="padding: 10px; text-align: center; color: #666;">Нет маршрутов</div>';
            }

            const evacDiv = document.getElementById('evacuationList');
            evacDiv.innerHTML = '';
            evacuationRoutes[currentFloor].forEach(route => {
                const div = document.createElement('div');
                div.className = `route-item evacuation ${selectedRoute === route ? 'selected' : ''}`;
                div.innerHTML = `
                    <div class="route-name evacuation">🔴 ${route.name}</div>
                    <div class="item-actions">
                        <span class="action-icon delete" onclick="deleteRoute('${route.id}', 'evacuation')">🗑️</span>
                    </div>
                `;
                evacDiv.appendChild(div);
            });
            if (evacuationRoutes[currentFloor].length === 0) {
                evacDiv.innerHTML = '<div style="padding: 10px; text-align: center; color: #666;">Нет эвакуационных маршрутов</div>';
            }
        }

        window.deleteRoute = async function(routeId, type) {
            if (confirm('Удалить этот маршрут?')) {
                if (type === 'normal') {
                    normalRoutes[currentFloor] = normalRoutes[currentFloor].filter(r => r.id !== routeId);
                } else {
                    evacuationRoutes[currentFloor] = evacuationRoutes[currentFloor].filter(r => r.id !== routeId);
                }
                if (selectedRoute?.id === routeId) selectedRoute = null;
                updateLists();
                await forceSaveAll();
                draw();
            }
        };

        function clearCurrentFloor() {
            if (confirm(`Очистить ВСЕ маршруты на ${currentFloor} этаже?`)) {
                normalRoutes[currentFloor] = [];
                evacuationRoutes[currentFloor] = [];
                selectedRoute = null;
                updateLists();
                forceSaveAll();
                draw();
            }
        }

        function showStatus(message) {
            const statusSpan = document.getElementById('saveStatus');
            statusSpan.innerHTML = message;
            setTimeout(() => {
                if (statusSpan.innerHTML === message) {
                    statusSpan.innerHTML = '✅ Готов к работе';
                }
            }, 3000);
        }

        // ========== СОХРАНЕНИЕ ==========
        async function forceSaveAll() {
            try {
                // Сохраняем обычные маршруты
                const normalData = {};
                for (let f = 1; f <= 3; f++) {
                    for (const route of normalRoutes[f]) {
                        normalData[route.id] = {
                            name: route.name,
                            points: route.points,
                            type: 'normal'
                        };
                    }
                }
                const save1 = await fetch('/api/routes', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(normalData)
                });

                // Сохраняем эвакуационные маршруты
                const evacData = {};
                for (let f = 1; f <= 3; f++) {
                    for (const route of evacuationRoutes[f]) {
                        evacData[route.id] = {
                            name: route.name,
                            points: route.points,
                            type: 'evacuation',
                            color: '#dc2626'
                        };
                    }
                }
                const save2 = await fetch('/api/evacuation-routes', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(evacData)
                });

                if (save1.ok && save2.ok) {
                    showStatus('✅ Сохранено!');
                    console.log('Сохранено:', Object.keys(normalData).length, 'обычных,', Object.keys(evacData).length, 'эвакуационных');
                } else {
                    showStatus('❌ Ошибка сохранения');
                }
            } catch (error) {
                console.error('Ошибка сохранения:', error);
                showStatus('❌ Ошибка сохранения');
            }
        }

        function fitToScreen() {
            const allRoutes = [...normalRoutes[currentFloor], ...evacuationRoutes[currentFloor]];
            let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;

            allRoutes.forEach(route => {
                route.points.forEach(point => {
                    minX = Math.min(minX, point.x);
                    minY = Math.min(minY, point.y);
                    maxX = Math.max(maxX, point.x);
                    maxY = Math.max(maxY, point.y);
                });
            });

            if (minX === Infinity) {
                offsetX = canvas.width / 2 - 400;
                offsetY = canvas.height / 2 - 300;
                scale = 1;
            } else {
                const padding = 50;
                minX -= padding;
                minY -= padding;
                maxX += padding;
                maxY += padding;
                const mapWidth = maxX - minX;
                const mapHeight = maxY - minY;
                scale = Math.min(canvas.width / mapWidth, canvas.height / mapHeight) * 0.9;
                scale = Math.min(Math.max(scale, 0.3), 3);
                const centerX = (minX + maxX) / 2;
                const centerY = (minY + maxY) / 2;
                offsetX = canvas.width / 2 - centerX * scale;
                offsetY = canvas.height / 2 - centerY * scale;
            }
            draw();
        }

        window.addEventListener('resize', () => {
            resizeCanvas();
            fitToScreen();
        });

        // Глобальные функции
        window.setRouteType = setRouteType;
        window.changeFloor = changeFloor;
        window.forceSaveAll = forceSaveAll;
        window.clearCurrentFloor = clearCurrentFloor;

        // ЗАПУСК
        resizeCanvas();
        loadData();
        setRouteType('normal');
        document.querySelector('.floor-btn[data-floor="1"]').classList.add('active');

        console.log('✅ Редактор готов. Инструкция:');
        console.log('1. Выберите тип маршрута (синий/красный)');
        console.log('2. КЛИКАЙТЕ на карте - добавляются точки');
        console.log('3. ДВОЙНОЙ КЛИК - закончить рисование');
        console.log('4. ПРАВЫЙ КЛИК на маршруте - выделить');
        console.log('5. Нажмите 💾 ПРИНУДИТЕЛЬНО СОХРАНИТЬ');
    </script>
</body>
</html>
